<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Manage Camp Schedules</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
      font-size: 12px;
    }

    header {
      background-color: #d9534f;
      padding: 10px 0;
    }

    header .nav-link {
      color: white;
      font-weight: 500;
      font-size: 13px;
    }

    .btn-red {
      background-color: #d9534f;
      color: white;
      font-size: 12px;
      padding: 6px 12px;
    }

    .btn-red:hover {
      background-color: #c9302c;
      color: white;
    }

    .form-section {
      background: transparent;
      padding: 0;
      box-shadow: none;
      border-radius: 0;
    }

    .table th, .table td {
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>
  <div class="container d-flex align-items-center justify-content-between">
    <a href="{% url 'home' %}">
      <img src="{% static 'img/image/b12.jpg' %}" alt="Logo" height="50" width="50">
    </a>
    
    <nav class="nav ms-auto d-flex gap-2">
      <a href="{% url 'dashboard' %}" class="btn btn-light btn-sm">Back</a>
    </nav>
  </div>
</header>

<div class="container my-4">
  <div class="form-section" style="max-width: 1000px; margin: auto;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="text-danger">Manage Camp Schedules</h5>
      <a href="{% url 'add_camp' %}" class="btn btn-red btn-sm">+ Add Camp</a>
    </div>

    <table class="table table-bordered table-striped">
      <thead>
        <tr>
          <th>Title</th>
          <th>State</th>
          <th>District</th>
          <th>Address</th>
          <th>Date</th>
          <th>Time</th>
         
        </tr>
      </thead>
      <tbody>
        {% for camp in camps %}
        <tr>
          <td>{{ camp.title }}</td>
          <td>{{ camp.state }}</td>
          <td>{{ camp.district }}</td>
          <td>{{ camp.address }}</td>
          <td>{{ camp.date }}</td>
          <td>{{ camp.time }}</td>
          
        </tr>
        {% empty %}
        <tr>
          <td colspan="7" class="text-center">No camps scheduled.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
