<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Rejection Message</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
      font-size: 12px;
    }

    header {
      background-color: #d9534f;
      padding: 10px 0;
    }

    header .nav-link {
      color: white;
      font-weight: 500;
      font-size: 13px;
    }

    .form-label {
      margin-bottom: 2px;
      font-weight: 500;
    }

    .form-control {
      font-size: 12px;
      padding: 4px 8px;
      height: auto;
    }

    .form-section {
      background: transparent;
      padding: 0;
      box-shadow: none;
      border-radius: 0;
    }

    .btn-red {
      background-color: #d9534f;
      color: white;
      font-size: 12px;
      padding: 6px 12px;
    }

    .btn-red:hover {
      background-color: #c9302c;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <div class="container d-flex align-items-center justify-content-between">
      <a href="{% url 'home' %}">
        <img src="{% static 'img/image/b12.jpg' %}" alt="Logo" height="50" width="50">
      </a>
      
      <nav class="nav ms-auto d-flex gap-2">
        <a href="{% url 'dashboard' %}" class="btn btn-light btn-sm">Back</a>
      </nav>
    </div>
  </header>

  <div class="container my-4">
    <div class="form-section" style="max-width: 700px; margin: auto;">
      <h5 class="text-center text-danger mb-3">Send Rejection Message to {{ req.name }}</h5>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Rejection Reason</label>
          <textarea class="form-control" name="message" rows="6" required></textarea>
        </div>
        <div class="text-center mt-3">
          <button type="submit" class="btn btn-red px-4">Send Message</button>
          <a href="{% url 'dashboard' %}" class="btn btn-secondary btn-sm ms-2">Cancel</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
