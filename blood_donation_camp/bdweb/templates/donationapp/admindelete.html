<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Delete Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
      font-size: 12px;
    }

    header {
      background-color: #d9534f;
      padding: 10px 0;
    }

    .nav-link {
      color: white;
      font-weight: 500;
      font-size: 13px;
    }

    .card {
      max-width: 500px;
      margin: auto;
      padding: 20px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      margin-top: 100px;
    }

    .btn-sm {
      font-size: 12px;
      padding: 5px 12px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <header>
    <div class="container d-flex align-items-center justify-content-between">
      <a href="{% url 'home' %}">
        <img src="{% static 'img/image/b12.jpg' %}" alt="Logo" height="50" width="50">
      </a>
      
      <nav class="nav ms-auto">
        <a class="nav-link" href="{% url 'adminlist' %}"> Back </a>
      </nav>
    </div>
  </header>

  <div class="container my-4">
    <div class="card text-center">
      <h5 class="text-danger mb-3">
        Are you sure you want to delete admin: 
        <span class="fw-bold">{{ admin.user.first_name }}</span>?
      </h5>
      <form method="post">
        {% csrf_token %}
        <div class="btn-group mt-3">
          <button type="submit" class="btn btn-danger btn-sm">Yes, Delete</button>
          <a href="{% url 'adminlist' %}" class="btn btn-secondary btn-sm">Cancel</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
