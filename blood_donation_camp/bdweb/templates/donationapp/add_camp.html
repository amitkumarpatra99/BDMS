<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Add Camp Schedule</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
      font-size: 12px;
    }

    header {
      background-color: #d9534f;
      padding: 10px 0;
    }

    header .nav-link {
      color: white;
      font-weight: 500;
      font-size: 13px;
    }

    .form-label {
      margin-bottom: 2px;
      font-weight: 500;
    }

    .form-control {
      font-size: 12px;
      padding: 4px 8px;
      height: 30px;
    }

    .form-section {
      background: transparent;
      padding: 0;
      box-shadow: none;
      border-radius: 0;
    }

    .btn-red {
      background-color: #d9534f;
      color: white;
      font-size: 12px;
      padding: 6px 12px;
    }

    .btn-red:hover {
      background-color: #c9302c;
    }
  </style>
</head>
<body>

<header>
  <div class="container d-flex align-items-center justify-content-between">
    <a href="{% url 'home' %}">
      <img src="{% static 'img/image/b12.jpg' %}" alt="Logo" height="50" width="50">
    </a>
    
    <nav class="nav ms-auto d-flex gap-2">
      <a href="{% url 'manage_camps' %}" class="btn btn-light btn-sm">Back</a>
    </nav>
  </div>
</header>

<div class="container my-4">
  <div class="form-section" style="max-width: 900px; margin: auto;">
    <h5 class="text-center text-danger mb-3">Add Camp Schedule</h5>
    <form method="post">
      {% csrf_token %}
      <div class="row g-2">
        <div class="col-md-6">
          <label class="form-label">Title</label>
          <input type="text" class="form-control" name="title" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Date</label>
          <input type="date" class="form-control" name="date" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Time</label>
          <input type="time" class="form-control" name="time" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">State</label>
          <input type="text" class="form-control" name="state" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">District</label>
          <input type="text" class="form-control" name="district" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Address</label>
          <input type="text" class="form-control" name="address" required>
        </div>
        
      </div>

      <div class="text-center mt-3">
        <button type="submit" class="btn btn-red px-4">Add Camp</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
