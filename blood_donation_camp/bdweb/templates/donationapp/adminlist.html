<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Admin List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
      font-size: 12px;
    }
    .btn-red {
      background-color: #d9534f;
      color: white;
    }
    th, td {
      vertical-align: middle !important;
      text-align: center;
    }
  </style>
</head>
<body>
  <header style="background-color: #d9534f; padding: 10px 0;">
    <div class="container d-flex align-items-center justify-content-between">
      <a href="{% url 'home' %}">
        <img src="{% static 'img/image/b12.jpg' %}" alt="Logo" height="50" width="50">
      </a>
      
      <nav class="nav ms-auto d-flex gap-2">
        <a class="btn btn-light btn-sm" href="{% url 'adminregister' %}">Add Admin</a>
        <a class="btn btn-light btn-sm" href="{% url 'dashboard' %}">Back</a>
      </nav>
    </div>
  </header>

  <div class="container my-4">
    <h3 class="text-center text-danger">Admin List</h3>
    <table class="table table-bordered table-hover">
      <thead class="table-secondary">
        <tr>
          <th>#</th>
          <th>Full Name</th>
          <th>Email</th>
          <th>Contact</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for admin in admins %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>{{ admin.user.first_name }}</td>
          <td>{{ admin.user.email }}</td>
          <td>{{ admin.mobile_number }}</td>
          <td>
            <a href="{% url 'admin_edit' admin.id %}" class="btn btn-sm btn-primary" title="Edit">
              <i class="bi bi-pencil-square"></i>
            </a>
            <a href="{% url 'admin_delete' admin.id %}" class="btn btn-sm btn-danger" title="Delete">
              <i class="bi bi-trash"></i>
            </a>
            <a href="{% url 'admin_reset_password' admin.id %}" class="btn btn-sm btn-warning" title="Reset Password">
              <i class="bi bi-key-fill"></i>
            </a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
