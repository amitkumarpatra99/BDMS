<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Add Blood Stock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
      font-size: 12px;
    }

    header {
      background-color: #d9534f;
      padding: 10px 0;
    }

    .form-box {
      background-color: #fff;
      padding: 30px;
      border-radius: 5px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .form-label {
      font-weight: 500;
    }

    .form-control {
      font-size: 12px;
      padding: 10px;
    }

    .btn-danger {
      background-color: #d9534f;
      color: white;
    }

    .btn-danger:hover {
      background-color: #c9302c;
    }

    .btn-back {
      background-color: #6c757d;
      color: white;
    }

    .btn-back:hover {
      background-color: #5a6268;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      font-weight: 600;
    }

    .form-box .form-control {
      height: 38px;
    }

    .form-group button {
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <div class="container d-flex align-items-center justify-content-between">
      <a href="{% url 'home' %}">
        <img src="{% static 'img/image/b12.jpg' %}" alt="Logo" height="50" width="50">
      </a>
      
      <nav class="nav ms-auto d-flex gap-2">
        <a class="btn btn-light btn-sm" href="{% url 'dashboard' %}">Back</a>
      </nav>
    </div>
  </header>

  <div class="container my-4">
    <h3 class="text-center text-danger mb-4">Add Blood Stock</h3>

    <div class="form-box mx-auto" style="max-width: 600px;">
      <form method="post">
        {% csrf_token %}
        
        <!-- Add Bootstrap grid system for proper form alignment -->
        <div class="form-group">
          <label for="id_blood_group" class="form-label">Blood Group</label>
          {{ form.blood_group }}
        </div>

        <div class="form-group">
          <label for="id_units" class="form-label">Units</label>
          {{ form.units }}
        </div>

        <div class="form-group">
          <label for="id_date_collected" class="form-label">Date of Collection</label>
          {{ form.date_collected }}
        </div>

        <div class="text-center mt-3">
          <button type="submit" class="btn btn-danger px-4">Add Stock</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
