<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
      font-size: 12px;
    }

    header {
      background-color: #d9534f;
      padding: 10px 0;
    }

    .nav-link {
      color: white;
      font-weight: 500;
      font-size: 13px;
    }

    .form-container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .form-label {
      margin-bottom: 4px;
      font-weight: 500;
    }

    .form-control {
      font-size: 12px;
      height: 30px;
      padding: 4px 8px;
    }

    .btn-warning {
      font-size: 12px;
      padding: 6px 12px;
    }

    @media (max-width: 576px) {
      .form-container {
        padding: 15px;
      }

      .form-control {
        height: 28px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container d-flex align-items-center justify-content-between">
      <a href="{% url 'home' %}">
        <img src="{% static 'img/image/b12.jpg' %}" alt="Logo" height="50" width="50">
      </a>
      
      <nav class="nav ms-auto">
        <a class="nav-link" href="{% url 'adminlist' %}">Back </a>
      </nav>
    </div>
  </header>

  <div class="container my-4">
    <div class="form-container">
      <h5 class="text-center text-danger mb-3">Reset Admin Password</h5>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" class="form-control" name="new_password" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm New Password</label>
          <input type="password" class="form-control" name="confirm_password" required>
        </div>
        <div class="text-center mt-3">
          <button type="submit" class="btn btn-warning px-4">Reset Password</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
