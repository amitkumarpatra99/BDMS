<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Manage Donors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
      font-size: 12px;
    }

    header {
      background-color: #d9534f;
      padding: 10px 0;
    }

    header .nav-link {
      color: white;
      font-weight: 500;
      font-size: 13px;
    }

    .btn-red {
      background-color: #d9534f;
      color: white;
      font-size: 12px;
      padding: 6px 12px;
    }

    .btn-red:hover {
      background-color: #c9302c;
      color: white;
    }

    .table th, .table td {
      font-size: 12px;
    }
  </style>
</head>
<body>
<header>
  <div class="container d-flex align-items-center justify-content-between">
    <a href="{% url 'home' %}">
      <img src="{% static 'img/image/b12.jpg' %}" alt="Logo" height="50" width="50">
    </a>
    
    <a href="{% url 'dashboard' %}" class="btn btn-sm btn-light">Back </a>
  </div>
</header>

<div class="container my-4">
  <div class="form-section" style="max-width: 1000px; margin: auto;">
    <h5 class="text-center text-danger mb-3">Manage Recipients</h5>


    <table class="table table-bordered table-striped">
      <thead>
        <tr>
            <th>Name</th><th>Email</th><th>Contact</th><th>Gender</th><th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for recipient in recipients %}
        <tr>
            <td>{{ recipient.name }}</td>
            <td>{{ recipient.email }}</td>
            <td>{{ recipient.contact }}</td>
            <td>{{ recipient.gender }}</td>
          <td>
            <a href="?delete={{ donor.id }}" class="btn btn-sm btn-danger"
               onclick="return confirm('Are you sure you want to delete this donor?')">Delete</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
