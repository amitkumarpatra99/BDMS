<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Edit Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
      font-size: 12px;
    }

    header {
      background-color: #d9534f;
      padding: 10px 0;
    }

    .nav-link {
      color: white;
      font-weight: 500;
      font-size: 13px;
    }

    .card {
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      padding: 20px;
      background-color: white;
    }

    .form-label {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .form-control {
      font-size: 12px;
      padding: 4px 8px;
      height: 30px;
    }

    .btn-danger {
      font-size: 12px;
      padding: 6px 16px;
    }

    @media (max-width: 576px) {
      .card {
        padding: 15px;
      }

      .form-control {
        height: 28px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container d-flex align-items-center justify-content-between">
      <a href="{% url 'home' %}">
        <img src="{% static 'img/image/b12.jpg' %}" alt="Logo" height="50" width="50">
      </a>
      
      <nav class="nav ms-auto">
        <a class="nav-link" href="{% url 'adminlist' %}"> Back </a>
      </nav>
    </div>
  </header>

  <div class="container my-4">
    <div class="card mx-auto" style="max-width: 500px;">
      <h5 class="text-center text-danger mb-3">Edit Admin</h5>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" name="name" value="{{ admin.user.first_name }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" value="{{ admin.user.email }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Contact</label>
          <input type="tel" class="form-control" name="contact" value="{{ admin.mobile_number }}" pattern="[0-9]{10}" required>
        </div>
        <div class="text-center mt-3">
          <button type="submit" class="btn btn-danger">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
