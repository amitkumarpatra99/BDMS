<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Admin Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
      font-size: 12px;
    }

    header {
      background-color: #d9534f;
      padding: 10px 0;
    }

    header .nav-link {
      color: white;
      font-weight: 500;
      font-size: 13px;
    }

    .form-label {
      margin-bottom: 2px;
      font-weight: 500;
    }

    .form-control {
      font-size: 12px;
      padding: 4px 8px;
      height: 30px;
    }

    .form-section {
        background: transparent;
        padding: 0;
        box-shadow: none;
        border-radius: 0;
      }

    .btn-red {
      background-color: #d9534f;
      color: white;
      font-size: 12px;
      padding: 6px 12px;
    }

    .btn-red:hover {
      background-color: #c9302c;
      color: white;
    }

    @media (max-width: 576px) {
      .form-control {
        height: 28px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container d-flex align-items-center justify-content-between">
      <a href="{% url 'home' %}">
        <img src="{% static 'img/image/b12.jpg' %}" alt="Logo" height="50" width="50">
      </a>
      
      <nav class="nav ms-auto d-flex gap-2">
        <a href="{% url 'dashboard' %}" class="btn btn-sm btn-light"> Back </a>
      </nav>
    </div>
  </header>

  <div class="container my-4">
    <div class="form-section" style="max-width: 900px; margin: auto;">
        <h5 class="text-center text-danger mb-3">Admin Registration</h5>
        <form method="post">
          {% csrf_token %}
          <div class="row g-2">
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" name="name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" name="email" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Contact</label>
              <input type="tel" class="form-control" name="contact" pattern="[0-9]{10}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" name="password" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Confirm Password</label>
              <input type="password" class="form-control" name="confirm_password" required>
            </div>
          </div>
        
          <div class="text-center mt-3">
            <button type="submit" class="btn btn-red px-4">Register Admin</button>
          </div>
        </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
